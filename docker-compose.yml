services:
  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 3001
      SQLITE_PATH: /app/data/events.db
    ports:
      - '3001:3001'
    volumes:
      - sqlite_data:/app/data

  web:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - api

volumes:
  sqlite_data:
