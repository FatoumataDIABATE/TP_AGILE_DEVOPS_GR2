services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventsdb
      POSTGRES_USER: events
      POSTGRES_PASSWORD: events
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U events -d eventsdb']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgres://events:events@db:5432/eventsdb
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - api

volumes:
  postgres_data: